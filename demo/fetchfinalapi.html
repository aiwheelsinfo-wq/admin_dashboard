<!DOCTYPE html>
<html>
<head>
  <title>Fetch API - Car List</title>
</head>
<body>

<h1>Car List</h1>
<ul id="carList"></ul> <!-- This is where we'll show the vehicle numbers -->

<script>
  async function fetchCarList() {
    try {
      const response = await fetch("https://agnicarrental.com/admin2025/car_list_Agni.php");
      const data = await response.json();

      console.log("API response:", data); // ✅ See structure

      const carListEl = document.getElementById("carList");

      if (Array.isArray(data.carsdata)) {
        data.carsdata.forEach(car => {
          const li = document.createElement("li");
          li.textContent = car.vehicle_number || 'No vehicle number';
          carListEl.appendChild(li);
        });
      } else {
        carListEl.innerHTML = "<li>No cars found</li>";
      }

    } catch (err) {
      console.error("Fetch error:", err);
      document.getElementById("carList").innerHTML = "<li>Failed to load car data</li>";
    }
  }

  fetchCarList();
</script>

</body>
</html>
